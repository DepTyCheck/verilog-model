        endmodule: a
      full_example: |
        module tfft
          ( output logic eiezecp
          , output uwire kjagrfjq
          , output int jbfwqxka
          , output int ouafrjd
          , input int wx
          , input real bftmsuv
          , input wire i
          , input integer gymw
          );

          assign eiezecp = wx;
          assign kjagrfjq = gymw;
          assign jbfwqxka = wx;
          assign ouafrjd = i;
        endmodule: tfft

        module wecazlcleg
          (output integer yqnzybrx, output uwire xp, input int pypt, input int jqujyzt, input integer g);

          or rg(yqnzybrx, pypt, g);

          assign xp = g;
        endmodule: wecazlcleg

        module qzczsyeanw
          (input real ov, input integer dftixk, input int lvxtzb, input uwire qu);
