tools:
  - name: iverilog
    profile: sv
    repo: https://github.com/steveicarus/iverilog.git
    deps: autoconf autotools-dev bison flex libfl-dev gperf make gcc g++ cmake python3
    path: iverilog
    build: |
      sh autoconf.sh
      ./configure
      sudo make -j$(nproc)
    install: |
      sudo make install
    version: iverilog -V
    commands:
      - run: iverilog -g2012 -o a.out {file}
        error_regex: '(syntax error\W[A-z-\/0-9,.:]+ .*$|(error|sorry|assert|vvp): [\S ]+$)'
      - run: vvp a.out
        error_regex: '(syntax error\W[A-z-\/0-9,.:]+ .*$|(error|sorry|assert|vvp): [\S ]+$)'
    extra_ignored_regexes: >-
      "Unable to elaborate r-value: .*"
      "Code generation had .* error\(s\)\."

  - name: slang
    profile: sv
    repo: https://github.com/MikePopoloski/slang.git
    deps: cmake
    path: slang
    build: |
      sudo cmake -B build
      sudo cmake --build build -j$(nproc)
    install: |
      sudo cmake --install build --strip
    version: slang --version
    commands:
      - run: slang -Weverything {file}
        error_regex: 'error: [\S ]+$'

  - name: verilator
    profile: sv
    repo: https://github.com/verilator/verilator.git
    deps: autoconf autotools-dev bison flex help2man libfl-dev libelf-dev cmake
    path: verilator
    build: |
      autoconf
      ./configure
      make -j$(nproc)
    install: |
      sudo make install
    version: verilator --version
    commands:
      - run: |
          rm -rf obj_dir && \
          rm -f top.sv && \
          cp {file} top.sv && \
          verilator \
            --cc \
            --exe ci/conf/verilator/testbench.cpp \
            --timing \
            -Wno-fatal \
            -Wno-ASSIGNIN \
            --no-std \
            +1800-2023ext+sv \
            top.sv
        error_regex: '%Error(|\-[A-Z]+):( | Internal Error: )[A-z0-9-_\/]+.sv:\d+:\d+:[\S ]*$'
      - run: make -C obj_dir -f Vtop.mk Vtop && ./obj_dir/Vtop
        error_regex: '%Error[-A-z]*:[\S ]+'
    assets: ci/conf/verilator/testbench.cpp

  - name: surelog
    profile: sv
    repo: https://github.com/chipsalliance/Surelog.git
    deps: >-
      cmake gcc build-essential git pkg-config tclsh swig uuid-dev
      libgoogle-perftools-dev python3 python3-orderedmultidict
      python3-psutil python3-dev default-jre lcov zlib1g-dev
    path: surelog
    build: |
      pip3 install orderedmultidict psutil
      git submodule update --init --recursive
      make -j$(nproc)
    install: |
      sudo apt install -y libgoogle-perftools-dev
      pip3 install orderedmultidict
      sudo make install
    version: surelog --version
    commands:
      - run: surelog -parse -nopython -sv {file}

  - name: zachjs-sv2v
    profile: sv
    repo: https://github.com/zachjs/sv2v.git
    deps: haskell-stack
    path: zachjs-sv2v
    build: |
      make -j$(nproc)
    install: |
      echo $PWD
      sudo stack install --allow-different-user --local-bin-path /usr/local/bin
    version: sv2v --version
    commands:
      - run: sv2v -v {file}
        error_regex: "sv2v:(?!CallStack$).+"
    extra_ignored_regexes: >-
      "sv2v:Language\.SystemVerilog\.AST\.Type"

  - name: tree-sitter-systemverilog
    profile: sv
    repo: https://github.com/gmlarumbe/tree-sitter-systemverilog.git
    path: tssv
    install: pip install ".[core]"
    version: |
      python3 -c "from importlib.metadata import version as v; print('tree-sitter-systemverilog', v('tree-sitter-systemverilog'))"
    commands:
      - run: python3 ci/conf/tree-sitter-sv/run_ts.py {file}
    assets: ci/conf/tree-sitter-sv/run_ts.py

  - name: synlig
    profile: sv
    repo: https://github.com/chipsalliance/synlig.git
    deps: >-
      gcc-11 g++-11 build-essential cmake tclsh ant default-jre swig google-perftools
      libgoogle-perftools-dev python3 python3-dev python3-pip uuid uuid-dev tcl-dev flex
      libfl-dev git pkg-config libreadline-dev bison libffi-dev wget python3-orderedmultidict
    path: synlig
    build: |
      git submodule sync
      git submodule update --init --recursive third_party/{surelog,yosys}
      make -j$(nproc)
    install: |
      sudo make install -j$(nproc)
    version: synlig --version
    commands:
      - run: synlig -f systemverilog -o output.blif -S {file}
        error_regex: "ERROR: .*$"

  - name: sv_parser
    profile: sv
    repo: https://github.com/dalance/sv-parser.git
    deps: cargo
    rust_ver: "1.96"
    path: sv_parser
    build: |
      cargo build --release --example parse_sv
    install: |
      sudo install -m 755 target/release/examples/parse_sv /usr/local/bin/
    version: parse_sv -h
    commands:
      - run: parse_sv {file}

  - name: sv-elab
    profile: sv
    repo: https://github.com/povik/sv-elab.git
    deps: >-
      gawk git cmake make python3 lld bison clang flex libffi-dev libfl-dev libreadline-dev pkg-config tcl-dev zlib1g-dev graphviz xdot
    path: sv-elab
    build: |
      git clone https://github.com/YosysHQ/yosys.git
      cd yosys
      git submodule update --init --recursive
      cmake -B build . -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON -DCMAKE_BUILD_TYPE=Release --fresh
      cmake --build build --config Release --parallel $(nproc)
      sudo cmake --install build --strip
      cd ..
      git submodule update --init --recursive
      cmake -B build .
      cmake --build build -j$(nproc)
    install: |
      cd yosys
      sudo cmake --install build --strip
      cd ..
      sudo cmake --install build
    version: yosys --version
    commands:
      - run: yosys -m slang -p "read_slang {file}; hierarchy -check -top {top_module}; proc; opt; fsm; memory; sim -assert; clean"
        error_regex: "(ERROR|error): .*"
    extra_ignored_regexes: >-
      "Compilation failed"
      "too many errors emitted, stopping now"
      "Design elaboration failed; see full log for details"

  - name: ghdl
    profile: vhdl
    repo: https://github.com/ghdl/ghdl.git
    deps: llvm gnat clang libc++-dev libc++abi-dev
    path: ghdl
    build: |
      mkdir build
      cd build
      ../configure --with-llvm-config --prefix=/usr/local
      make
    install: |
      cd build
      sudo make install
    version: ghdl -v
    commands:
      - run: ghdl -a --std=19 {file}
        error_regex: "error: .*"
      - run: ghdl -e --std=19 {vhdl_top_entity}
        error_regex: "error: .*"
      - run: ghdl -r --std=19 {vhdl_top_entity}
        error_regex: "error: .*"
    extra_ignored_regexes: >-
      "compilation error"
      "no declaration for \S+"
      "entity \S+ was not analysed"

  - name: nvc
    profile: vhdl
    repo: https://github.com/nickg/nvc.git
    deps: build-essential automake autoconf flex check llvm-dev pkg-config zlib1g-dev libdw-dev libffi-dev libzstd-dev
    path: nvc
    build: |
      ./autogen.sh
      mkdir build && cd build
      ../configure
      make -j$(nproc)
    install: |
      cd build
      sudo make install
    version: nvc -v
    commands:
      - run: nvc --std=2019 --messages=compact -a {file}
        error_regex: "error: .*"
      - run: nvc --std=2019 --messages=compact -e {vhdl_top_entity}
        error_regex: "error: .*"
      - run: nvc --std=2019 --messages=compact -r {vhdl_top_entity}
        error_regex: "error: .*"
    extra_ignored_regexes: >-
      "design unit depends on WORK.* which was analysed with errors"

  - name: rust_hdl
    profile: vhdl
    repo: https://github.com/VHDL-LS/rust_hdl.git
    deps: git curl build-essential
    rust_ver: "1.96"
    path: rust_hdl
    build: |
      cargo build --release --manifest-path vhdl_lang/Cargo.toml
    install: |
      cargo install --force --path vhdl_lang
      sudo mkdir -p /usr/local/lib/rust_hdl
      sudo cp -r vhdl_libraries /usr/local/lib/rust_hdl/
    version: vhdl_lang -V
    commands:
      - run: vhdl_lang -c ci/conf/rust_hdl/vhdl_ls.toml
    assets: ci/conf/rust_hdl/vhdl_ls.toml

  - name: verible
    profile: sv
    repo: https://github.com/chipsalliance/verible.git
    deps: bazel bison build-essential ca-certificates curl flex git libfl-dev python3 unzip zip
    path: verible
    build: |
      bazel build :install-binaries --//bazel:use_local_flex_bison -c opt
      # bazel-bin is a symlink into Bazel's output base (outside the repo), so
      # caching the clone leaves broken links. Materialize real binaries first.
      mkdir -p .ci-installed
      .github/bin/simple-install.sh "$PWD/.ci-installed"
      bazel shutdown
    install: |
      sudo install .ci-installed/* /usr/local/bin/
    version: verible-verilog-format --version
    commands:
      - run: verible-verilog-format --failsafe_success=false {file}
        error_regex: .*.sv:.*$
      - run: verible-verilog-lint --rules_config ci/conf/verible/.rules.verible_lint {file}
        error_regex: ^.*\[Style:.*] \[.*]
      - run: verible-verilog-syntax {file}
    assets: ci/conf/verible/.rules.verible_lint
