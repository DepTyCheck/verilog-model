stage: synthesis
lang: sv
tool: verilator
id: inout_port_connection_to_inout_signal_requires_but_generates
title: Inout to inout connection requires X bits
regex: >
  Inout port connection .* to inout signal requires .* bits, but connection's .* generates .* bits
issue_novelty: unsupported
examples:
  - inout_port_connection_to_inout_signal_requires_but_generates_ex1:
      first_found: 19.04.2026
      full_error: |
        %Error-UNSUPPORTED: top.sv:67:46: Unsupported: Inout port connection 'xqvptg' to inout signal requires 2 bits, but connection's VARREF 'oghixndeep' generates 1 bits.
      full_example: |
        module fjwa (output bit [0:2] iojtblcfej, inout trior logic [4:4][1:1][2:4][2:3] siqcrlt [4:3], input supply0 logic [4:3] towfjos [1:0][0:3][4:0]);
        endmodule: fjwa

        module cngwqbgvr (output real xfaqgge, input wire logic fmzi [2:2][1:3][2:4], input real as [0:1]);

          xnor cw(xfaqgge, xtf, xtf);
          nand mcybx(ilnmsj, xfaqgge, kgfgfnqj);
          and l(kgfgfnqj, xfaqgge, xtf);

          // Multi-driven assigns
          assign ilnmsj = 'b00x0;
        endmodule: cngwqbgvr

        module dtlvuxtre (inout supply0 logic [2:3][2:4][2:4][1:0] svktdjjnj [1:0], inout supply1 logic [3:3][1:2] xqvptg, output wand logic [3:1] wvh);

          not phim(wvh, ecagne);
          xnor ixjns(vdpx, wv, wvh);
          xnor mcvmhzvhq(osmrqv, wvh, wvh);

          // Multi-driven assigns
          assign vdpx = 'b101;
          assign svktdjjnj = svktdjjnj;
        endmodule: dtlvuxtre

        module sstazsjx (inout wire logic [2:0][0:0] uzffbwu [4:4][4:3]);
          // Unpacked net declarations
          supply0 logic [2:3][2:4][2:4][1:0] wkojtzn [1:0];

          xnor aubmtlksm(gk, l, gk);
          dtlvuxtre dtjinhhlnk(.svktdjjnj(wkojtzn), .xqvptg(oghixndeep), .wvh(gk));
          xnor etmyurxyy(gk, gk, gk);
          nand idfh(lgdxvjir, rbuhxfudfg, mr);

          // Multi-driven assigns
          assign mr = gk;
          assign gk = 'bz01zz;
          assign uzffbwu = uzffbwu;
        endmodule: sstazsjx
