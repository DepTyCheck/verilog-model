---
name: Run tool on files
description: |
  Run the canonical Python runner over a directory of source files. On
  failure, build the MDS distance report from the same per-file JSON.
  Always uploads the per-file JSON; uploads the MDS HTML on failure only.

inputs:
  tool-name:
    required: true
  tool-version:
    required: false
    default: ""
  tool-commit:
    required: false
    default: ""
  model-commit:
    required: false
    default: ""
  commands-json:
    required: true
    description: "matrix.tool.commands JSON"
  input-dir:
    required: true
  ignored-errors-dir:
    required: true
  assets:
    required: false
    default: ""
  extra-ignored-regexes:
    required: false
    default: ""
  output-json:
    required: false
    default: ""
  mds-on-failure:
    required: false
    default: "true"
  mds-artifact-suffix:
    required: false
    default: ""
  job-link:
    required: true
  profile:
    required: true
    description: "Profile name, resolved against profiles-config"
  profiles-config:
    required: false
    default: ci/conf/profiles.yaml
    description: "Path to profiles.yaml"

runs:
  using: composite
  steps:
    - name: Resolve output JSON path
      id: paths
      shell: bash
      env:
        OUTPUT_JSON: ${{ inputs.output-json }}
        TOOL_NAME: ${{ inputs.tool-name }}
        MDS_ARTIFACT_SUFFIX: ${{ inputs.mds-artifact-suffix }}
      run: |
        if [ -n "$OUTPUT_JSON" ]; then
          path="$OUTPUT_JSON"
        else
          path="$TOOL_NAME-per-file.json"
        fi
        echo "per-file-json=$path" >> "$GITHUB_OUTPUT"
        mds_artifact_name="error-distances-$TOOL_NAME"
        if [ -n "$MDS_ARTIFACT_SUFFIX" ]; then
          mds_artifact_name="$mds_artifact_name-$MDS_ARTIFACT_SUFFIX"
        fi
        echo "mds-artifact-name=$mds_artifact_name" >> "$GITHUB_OUTPUT"

    - name: Resolve profile
      id: profile
      shell: bash
      env:
        PROFILES_CONFIG: ${{ inputs.profiles-config }}
        PROFILE: ${{ inputs.profile }}
      run: python3 ci/scripts/resolve_profile.py --profiles "$PROFILES_CONFIG" --profile "$PROFILE" >> "$GITHUB_OUTPUT"

    - name: Run tool
      id: run
      shell: bash
      env:
        INPUT_DIR: ${{ inputs.input-dir }}
        FILE_PATTERN: ${{ steps.profile.outputs.FILE_PATTERN }}
        TOOL_NAME: ${{ inputs.tool-name }}
        TOOL_VERSION: ${{ inputs.tool-version }}
        TOOL_COMMIT: ${{ inputs.tool-commit }}
        MODEL_COMMIT: ${{ inputs.model-commit }}
        COMMANDS_JSON: ${{ inputs.commands-json }}
        TRANSLATE_HOOK: ${{ steps.profile.outputs.TRANSLATE_HOOK }}
        IGNORED_ERRORS_DIR: ${{ inputs.ignored-errors-dir }}
        ASSETS: ${{ inputs.assets }}
        EXTRA_IGNORED_REGEXES: ${{ inputs.extra-ignored-regexes }}
        PER_FILE_JSON: ${{ steps.paths.outputs.per-file-json }}
      run: |
        set +e
        PYTHONPATH=ci/runner python -m runner.main \
          --input-dir "$INPUT_DIR" \
          --file-pattern "$FILE_PATTERN" \
          --tool-name "$TOOL_NAME" \
          --tool-version "$TOOL_VERSION" \
          --tool-commit "$TOOL_COMMIT" \
          --model-commit "$MODEL_COMMIT" \
          --commands-json "$COMMANDS_JSON" \
          --translate-hook "$TRANSLATE_HOOK" \
          --ignored-errors-dir "$IGNORED_ERRORS_DIR" \
          --assets "$ASSETS" \
          --extra-ignored-regexes "$EXTRA_IGNORED_REGEXES" \
          --output "$PER_FILE_JSON"
        echo "exit=$?" >> "$GITHUB_OUTPUT"

    - name: Install MDS deps (on failure)
      if: ${{ steps.run.outputs.exit != '0' && inputs.mds-on-failure == 'true' }}
      shell: bash
      run: pip install -r ci/runner/mds_report/requirements.txt

    - name: Generate MDS report (on failure)
      if: ${{ steps.run.outputs.exit != '0' && inputs.mds-on-failure == 'true' && hashFiles(steps.paths.outputs.per-file-json) != '' }}
      shell: bash
      env:
        PER_FILE_JSON: ${{ steps.paths.outputs.per-file-json }}
        IGNORED_ERRORS_DIR: ${{ inputs.ignored-errors-dir }}
        TOOL_NAME: ${{ inputs.tool-name }}
        JOB_LINK: ${{ inputs.job-link }}
      run: |
        PYTHONPATH=ci/runner python -m mds_report.main \
          --per-file-input "$PER_FILE_JSON" \
          --ignored-errors-dir "$IGNORED_ERRORS_DIR" \
          --tool-name "$TOOL_NAME" \
          --job-link "$JOB_LINK" \
          --output error_distances.html

    - name: Upload per-file JSON
      if: ${{ always() && hashFiles(steps.paths.outputs.per-file-json) != '' }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ steps.paths.outputs.per-file-json }}
        path: ${{ steps.paths.outputs.per-file-json }}

    - name: Upload MDS HTML
      if: ${{ steps.run.outputs.exit != '0' && hashFiles('error_distances.html') != '' }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ steps.paths.outputs.mds-artifact-name }}
        path: error_distances.html

    - name: Re-raise runner exit code
      if: ${{ steps.run.outputs.exit != '0' }}
      shell: bash
      run: exit 1
