name: Setup tool
description: |
  Clone, build (with caching), and install a tool from source.
  When `tool-repo` is empty, clone/build/cache/install are skipped — useful
  for tools shipped via system packages or pip (declared in
  `tool.python_runner_deps` in tools.yaml).

inputs:
  tool-name:
    required: true
  tool-repo:
    required: false
    default: ""
  tool-path:
    required: false
    default: ""
  tool-build:
    required: false
    default: ""
  tool-install:
    required: false
    default: ""
  tool-deps:
    required: false
    default: ""
  tool-version:
    required: false
    default: ""
  tool-rust-ver:
    required: false
    default: ""
  tool-pre-build:
    required: false
    default: ""
  tool-third-party-release-repo:
    required: false
    default: ""
  tool-third-party-release-name-wildcard:
    required: false
    default: ""

outputs:
  commit-hash:
    description: "Cloned tool commit hash"
    value: ${{ steps.clone.outputs.commit-hash }}

runs:
  using: composite
  steps:
    - name: Update apt
      shell: bash
      run: sudo apt update -qq

    - name: Clone tool
      id: clone
      if: inputs.tool-repo != ''
      shell: bash
      env:
        TOOL_REPO: ${{ inputs.tool-repo }}
        TOOL_PATH: ${{ inputs.tool-path }}
      run: |
        git clone "$TOOL_REPO" "$TOOL_PATH"
        cd "$TOOL_PATH"
        echo "commit-hash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    - name: Restore from cache
      if: inputs.tool-repo != ''
      id: cache-build
      uses: actions/cache/restore@v5
      with:
        path: ${{ inputs.tool-path }}
        key: ${{ inputs.tool-name }}-cache-${{ steps.clone.outputs.commit-hash }}

    - name: Add bazel repo (if needed)
      if: contains(inputs.tool-deps, 'bazel')
      shell: bash
      run: |
        sudo apt -qq -y install apt-transport-https curl gnupg
        curl -fsSL https://bazel.build/bazel-release.pub.gpg | gpg --dearmor > bazel.gpg
        chmod a+r bazel.gpg
        sudo mv bazel.gpg /etc/apt/trusted.gpg.d/
        sudo echo "deb [arch=amd64] https://storage.googleapis.com/bazel-apt stable jdk1.8" | sudo tee /etc/apt/sources.list.d/bazel.list
        sudo apt update -qq

    - name: Install tool-specific dependencies
      if: inputs.tool-deps != ''
      shell: bash
      env:
        TOOL_DEPS: ${{ inputs.tool-deps }}
      run: sudo apt -qq -y install $TOOL_DEPS

    - name: Setup Rust (if needed)
      if: inputs.tool-rust-ver != ''
      shell: bash
      env:
        TOOL_RUST_VER: ${{ inputs.tool-rust-ver }}
      run: |
        sudo apt -y install curl
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs > setup.sh
        sh setup.sh -y
        source "$HOME/.cargo/env"
        rustup install "$TOOL_RUST_VER"
        rustup default "$TOOL_RUST_VER"

    - name: Update haskell (if needed)
      if: contains(inputs.tool-deps, 'haskell') && steps.cache-build.outputs.cache-hit != 'true'
      shell: bash
      run: stack upgrade

    - name: Download third-party release (if needed)
      if: inputs.tool-third-party-release-repo != ''
      uses: robinraju/release-downloader@v1
      with:
        repository: ${{ inputs.tool-third-party-release-repo }}
        latest: true
        extract: true
        fileName: ${{ inputs.tool-third-party-release-name-wildcard }}

    - name: Pre-Build tool
      if: inputs.tool-pre-build != ''
      shell: bash
      env:
        TOOL_PRE_BUILD: ${{ inputs.tool-pre-build }}
      run: eval "$TOOL_PRE_BUILD"

    - name: Build tool
      if: inputs.tool-repo != '' && steps.cache-build.outputs.cache-hit != 'true'
      shell: bash
      env:
        TOOL_PATH: ${{ inputs.tool-path }}
        TOOL_BUILD: ${{ inputs.tool-build }}
      run: |
        echo "Build tool"
        cd "$TOOL_PATH"
        eval "$TOOL_BUILD"

    - name: Save build
      if: inputs.tool-repo != '' && steps.cache-build.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ${{ inputs.tool-path }}
        key: ${{ steps.cache-build.outputs.cache-primary-key }}

    - name: Install tool
      if: inputs.tool-install != ''
      shell: bash
      env:
        TOOL_PATH: ${{ inputs.tool-path }}
        TOOL_INSTALL: ${{ inputs.tool-install }}
      run: |
        echo "Install tool"
        cd "$TOOL_PATH"
        eval "$TOOL_INSTALL"

    - name: Print version
      if: inputs.tool-version != ''
      shell: bash
      env:
        TOOL_VERSION: ${{ inputs.tool-version }}
      run: $TOOL_VERSION
