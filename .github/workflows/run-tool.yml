---
# Reusable workflow: run a Python tool-checking pipeline against a single tool.
#
# Caller passes:
#   - tool_json:           full matrix.tool entry as JSON.
#   - python_module:       module to invoke via `python -m`.
#   - requirements_file:   pip -r target.
#   - args:                multi-line CLI args. Two-stage expansion:
#                            1. GHA `${{ ... }}` at caller-evaluation time (matrix, repo, sha, ...).
#                            2. Bash `$VAR` at workflow run time. Available bash vars:
#                                 GH_PAGES_PATH, GEN_PATH, TOOL_VERSION, COMMIT_HASH.
#   - unknown_errors_path: file path the python module writes; consumed by MDS-on-failure step.
#   - download_N_name/path (optional): up to 2 input artifacts.
#   - artifact_N_name/path/always (optional): up to 3 output artifacts.
#                          `always: true` uploads even on failure/cancel.
name: Run tool

on:
  workflow_call:
    inputs:
      tool_json:           { type: string,  required: true }
      python_module:       { type: string,  required: true }
      requirements_file:   { type: string,  required: true }
      args:                { type: string,  required: true }
      unknown_errors_path: { type: string,  required: true }

      download_1_name:     { type: string,  default: "" }
      download_1_path:     { type: string,  default: "" }
      download_2_name:     { type: string,  default: "" }
      download_2_path:     { type: string,  default: "" }

      artifact_1_name:     { type: string,  default: "" }
      artifact_1_path:     { type: string,  default: "" }
      artifact_1_always:   { type: boolean, default: false }
      artifact_2_name:     { type: string,  default: "" }
      artifact_2_path:     { type: string,  default: "" }
      artifact_2_always:   { type: boolean, default: false }
      artifact_3_name:     { type: string,  default: "" }
      artifact_3_path:     { type: string,  default: "" }
      artifact_3_always:   { type: boolean, default: false }

defaults:
  run:
    shell: bash

jobs:
  run:
    name: ${{ fromJSON(inputs.tool_json).name }}
    timeout-minutes: 90
    runs-on: ubuntu-latest
    env:
      GH_PAGES_PATH: verilog-gh-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set GEN_PATH from tool language
        run: |
          LANG="${{ fromJSON(inputs.tool_json).language }}"
          echo "GEN_PATH=generated-$LANG" >> "$GITHUB_ENV"

      - name: Install runner deps
        run: |
          sudo apt update -qq
          sudo apt install -y bc

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          pip install -r "${{ inputs.requirements_file }}"
          EXTRA="${{ fromJSON(inputs.tool_json).python_runner_deps }}"
          if [ -n "$EXTRA" ] && [ "$EXTRA" != "null" ]; then
            pip install $EXTRA
          fi

      - name: Setup tool
        uses: ./.github/actions/setup-tool
        with:
          tool-name: ${{ fromJSON(inputs.tool_json).name }}
          tool-repo: ${{ fromJSON(inputs.tool_json).repo }}
          tool-path: ${{ fromJSON(inputs.tool_json).path }}
          tool-build: ${{ fromJSON(inputs.tool_json).build }}
          tool-install: ${{ fromJSON(inputs.tool_json).install }}
          tool-deps: ${{ fromJSON(inputs.tool_json).deps }}
          tool-version: ${{ fromJSON(inputs.tool_json).version }}
          tool-rust-ver: ${{ fromJSON(inputs.tool_json).rust_ver || '' }}
          tool-pre-build: ${{ fromJSON(inputs.tool_json).pre_build || '' }}
          tool-third-party-release-repo: ${{ fromJSON(inputs.tool_json).third_party_release_repo || '' }}
          tool-third-party-release-name-wildcard: ${{ fromJSON(inputs.tool_json).third_party_release_name_wildcard || '' }}

      - name: Capture tool version
        run: |
          VER_CMD="${{ fromJSON(inputs.tool_json).version }}"
          echo "TOOL_VERSION=$($VER_CMD 2>&1 | head -1 || true)" >> "$GITHUB_ENV"

      - name: Clone gh-pages
        run: git clone https://github.com/DepTyCheck/verilog-model.git --branch gh-pages --single-branch "$GH_PAGES_PATH"

      - name: Download artifact 1
        if: ${{ inputs.download_1_name != '' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.download_1_name }}
          path: ${{ inputs.download_1_path }}

      - name: Download artifact 2
        if: ${{ inputs.download_2_name != '' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.download_2_name }}
          path: ${{ inputs.download_2_path }}

      - name: Run
        run: |
          set +e
          PYTHONPATH=ci/runner python3 -m ${{ inputs.python_module }} \
            ${{ inputs.args }}
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            exit 1
          fi

      - name: Upload artifact 1
        if: ${{ inputs.artifact_1_name != '' && (success() || (always() && inputs.artifact_1_always)) }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.artifact_1_name }}
          path: ${{ inputs.artifact_1_path }}

      - name: Upload artifact 2
        if: ${{ inputs.artifact_2_name != '' && (success() || (always() && inputs.artifact_2_always)) }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.artifact_2_name }}
          path: ${{ inputs.artifact_2_path }}

      - name: Upload artifact 3
        if: ${{ inputs.artifact_3_name != '' && (success() || (always() && inputs.artifact_3_always)) }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.artifact_3_name }}
          path: ${{ inputs.artifact_3_path }}

      - name: Install mds_report dependencies
        if: failure()
        run: pip install -r ci/runner/mds_report/requirements.txt

      - name: Generate MDS diagram
        if: ${{ failure() && hashFiles(inputs.unknown_errors_path) != '' }}
        run: |
          PYTHONPATH=ci/runner python3 -m mds_report.main \
            --unknown-errors-input "${{ inputs.unknown_errors_path }}" \
            --ignored-errors-dir "$GH_PAGES_PATH/found_errors/${{ fromJSON(inputs.tool_json).path }}" \
            --tool-name "${{ fromJSON(inputs.tool_json).name }}" \
            --job-link "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/${{ github.job }}" \
            --output error_distances.html

      - name: Upload error distances artifact
        if: ${{ failure() && hashFiles('error_distances.html') != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: error-distances-${{ fromJSON(inputs.tool_json).name }}
          path: error_distances.html
